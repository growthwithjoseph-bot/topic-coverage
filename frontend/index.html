<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Topic Coverage</title>
<style>
  :root {
    --only_you: #15803d; --you_lead: #22c55e; --even: #94a3b8;
    --comp_lead: #fb923c; --only_comp: #ef4444; --category: #64748b;
    --ink: #0f172a; --muted: #64748b; --line: #e2e8f0; --bg: #f8fafc;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header { padding: 18px 24px; border-bottom: 1px solid var(--line); background: #fff; }
  header h1 { margin: 0; font-size: 18px; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  .form { margin-top: 14px; display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field.grow { flex: 1 1 220px; }
  .field label { font-size: 11.5px; color: var(--muted); font-weight: 600; }
  .field .hint { font-weight: 400; }
  .field input { padding: 8px 10px; border: 1px solid var(--line); border-radius: 7px; font-size: 14px; }
  .field input:focus { outline: 2px solid #93c5fd; border-color: #93c5fd; }
  #maxPages { width: 130px; }
  #analyzeBtn { padding: 9px 18px; border: 0; border-radius: 7px; background: var(--ink);
    color: #fff; font-weight: 600; cursor: pointer; font-size: 14px; }
  #analyzeBtn:disabled { opacity: .5; cursor: default; }
  .controls-secondary { margin-top: 10px; display: flex; gap: 8px; align-items: center;
    flex-wrap: wrap; color: var(--muted); font-size: 12.5px; }
  .controls-secondary .sep { color: var(--line); }
  .load-existing input { width: 60px; padding: 3px 6px; border: 1px solid var(--line);
    border-radius: 5px; margin: 0 2px; }
  .load-existing button { padding: 3px 10px; border: 1px solid var(--line); border-radius: 5px;
    background: #fff; cursor: pointer; }
  .progress { margin-top: 12px; }
  .progress .bar { height: 8px; border-radius: 999px; background: var(--line); overflow: hidden; }
  .progress .bar > span { display: block; height: 100%; background: #2563eb; width: 0;
    transition: width .4s ease; }
  .progress .steps { display: flex; gap: 14px; margin-top: 8px; font-size: 12.5px; color: var(--muted); flex-wrap: wrap; }
  .progress .steps b { color: var(--ink); }
  .progress .steps .done::before { content: "✓ "; color: var(--you_lead); }
  .progress .steps .active { color: #2563eb; font-weight: 600; }
  .progress .counts { margin-top: 6px; font-size: 12px; color: var(--muted); }
  .progress .domains { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
  .progress .domains .dchip { font-size: 12px; padding: 3px 9px; border: 1px solid var(--line);
    border-radius: 999px; background: #fff; color: var(--ink); }
  .progress .domains .dchip.own { border-color: #86efac; background: #f0fdf4; }
  .progress .domains .dchip b { font-variant-numeric: tabular-nums; }
  .progress.error .bar > span { background: var(--only_comp); }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; padding: 12px 24px;
    border-bottom: 1px solid var(--line); background: #fff; font-size: 12.5px; color: var(--muted); }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
  .wrap { display: grid; grid-template-columns: minmax(0, 1.3fr) minmax(320px, 1fr); gap: 8px; }
  @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } }
  #map { padding: 12px; min-height: 200px; }
  #map .muted { color: var(--muted); padding: 40px; text-align: center; }

  /* detail panel */
  #detail { padding: 20px 24px; border-left: 1px solid var(--line); background: #fff; min-height: 70vh; }
  #detail .empty { color: var(--muted); margin-top: 40px; text-align: center; }
  .chip { display: inline-block; padding: 3px 10px; border-radius: 999px; color: #fff;
    font-size: 12px; font-weight: 700; text-transform: capitalize; }
  #detail h2 { margin: 12px 0 2px; font-size: 20px; }
  #detail .cat { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .sharebar { display: flex; height: 26px; border-radius: 6px; overflow: hidden; margin: 8px 0 4px;
    border: 1px solid var(--line); font-size: 12px; font-weight: 700; color: #fff; }
  .sharebar .you { background: #22c55e; display: flex; align-items: center; justify-content: center; }
  .sharebar .comp { background: #fb923c; display: flex; align-items: center; justify-content: center; }
  .sharelabels { display: flex; justify-content: space-between; color: var(--muted); font-size: 12px; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 22px; }
  @media (max-width: 640px) { .cols { grid-template-columns: 1fr; } }
  .cols h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted);
    margin: 0 0 10px; }
  .ev { border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
  .ev p { margin: 0 0 8px; font-size: 13px; }
  .ev a { font-size: 12px; color: #2563eb; text-decoration: none; }
  .ev a:hover { text-decoration: underline; }
  .ev mark { background: #fef08a; padding: 0 1px; border-radius: 2px; }
  .ev-domain { font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
  .ev-title { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
  .ev-url { display: block; word-break: break-all; color: #2563eb; margin-bottom: 2px; }
  .ev-more { font-weight: 600; }
  .col-empty { color: var(--muted); font-size: 13px; font-style: italic; }
  .section-title { margin: 24px 0 0; font-size: 13px; text-transform: uppercase;
    letter-spacing: .04em; color: var(--muted); }
</style>
</head>
<body>
  <header>
    <h1>Topic Coverage</h1>
    <p>Who covers what, and who covers it more — a pure content comparison.</p>
    <form id="analyzeForm" class="form">
      <div class="field grow">
        <label for="ownDomain">Your domain</label>
        <input id="ownDomain" placeholder="acme.com" autocomplete="off" required />
      </div>
      <div class="field grow">
        <label for="compDomains">Competitor domains <span class="hint">(comma-separated)</span></label>
        <input id="compDomains" placeholder="rival.com, boards.com, notewise.com" autocomplete="off" />
      </div>
      <div class="field">
        <label for="maxPages">Max pages / domain <span class="hint">(blank = all)</span></label>
        <input id="maxPages" type="number" min="1" placeholder="all" />
      </div>
      <button id="analyzeBtn" type="submit">Analyze</button>
    </form>
    <div class="controls-secondary">
      <span id="status"></span>
    </div>
    <div id="progress" class="progress" hidden></div>
  </header>

  <div class="legend">
    <span><i class="dot" style="background:var(--only_you)"></i> Only you</span>
    <span><i class="dot" style="background:var(--you_lead)"></i> You lead</span>
    <span><i class="dot" style="background:var(--even)"></i> Even</span>
    <span><i class="dot" style="background:var(--comp_lead)"></i> Competitor leads</span>
    <span><i class="dot" style="background:var(--only_comp)"></i> Only competitor</span>
    <span><i class="dot" style="background:var(--category)"></i> Category</span>
  </div>

  <div class="wrap">
    <div id="map"><div class="muted">Loading map…</div></div>
    <aside id="detail"><div class="empty">Click a topic to see the content detected on it.</div></aside>
  </div>

  <script src="radial-map.js"></script>
  <script src="app.js"></script>
</body>
</html>
